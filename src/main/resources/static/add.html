<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Employee</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet">
<style>
.toast-msg {
	position: fixed;
	bottom: 10px;
	right: 20px;
	padding: 5px;
	min-width: 250px;
	max-width: 300px;
	z-index: 1000;
}
</style>
</head>

<body class="bg-light">

    <!-- NavBar -->
    <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container">
            <h3 class="mx-auto text-white fw-bold">Employee
                Management System</h3>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow">

                    <div
                        class="card-header text-center bg-primary text-white">
                        <h4>Add Employee</h4>
                    </div>

                    <!-- Add Employee Form -->
                    <form onsubmit="addEmployee(event)">
                        <div class="card-body">

                            <div class="mb-3">
                                <label class="form-label">Name <span
                                    class="text-danger">*</span></label> <input
                                    type="text" id="name"
                                    class="form-control"
                                    placeholder="Enter Name"> <small
                                    id="nameError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email
                                    <span class="text-danger">*</span>
                                </label> <input type="email" id="email"
                                    class="form-control"
                                    placeholder="Enter Email"> <small
                                    id="emailError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone
                                    <span class="text-danger">*</span>
                                </label> <input type="text" id="phone"
                                    class="form-control"
                                    placeholder="Enter Phone"> <small
                                    id="phoneError" class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Department
                                    <span class="text-danger">*</span>
                                </label> <input type="text" id="department"
                                    class="form-control"
                                    placeholder="Enter Department">
                                <small id="departmentError"
                                    class="text-danger"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Salary
                                    <span class="text-danger">*</span>
                                </label> <input type="number" id="salary"
                                    class="form-control"
                                    placeholder="Enter Salary">
                                <small id="salaryError"
                                    class="text-danger"></small>
                            </div>

                            <button type="submit"
                                class="btn btn-success w-100">Add
                                Employee</button>

                        </div>
                    </form>
                </div>

            </div>

        </div>

    </div>

    <!-- Toast Messages -->
    <div id="successToast"
        class="alert alert-success text-center toast-msg"
        style="display: none;">Success Message</div>

    <div id="errorToast"
        class="alert alert-danger text-center toast-msg"
        style="display: none;">Error Message</div>

    <script>
    
    const BASE_URL = "https://employee-management-system-springboot-dbuw.onrender.com";
    
 	// Clear previous validation messages
	function clearErrors() {
	    document.getElementById("nameError").innerText = "";
	    document.getElementById("emailError").innerText = "";
	    document.getElementById("phoneError").innerText = "";
	    document.getElementById("departmentError").innerText = "";
	    document.getElementById("salaryError").innerText = "";
	}
	
	function addEmployee(event) {
		 // Prevents default form submission and handle it via JavaScript
	    event.preventDefault();
	    clearErrors(); 

	    const name = document.getElementById("name").value;
	    const email = document.getElementById("email").value;
	    const phone = document.getElementById("phone").value;
	    const department = document.getElementById("department").value;
	    const salary = document.getElementById("salary").value;
		
	    // Send employee data to the backend API
	    fetch(BASE_URL + "/employees", {
	        method: "POST",
	        headers: {
	            "Content-Type": "application/json"
	        },
	        body: JSON.stringify({
	            name,
	            email,
	            phone,
	            department,
	            salary
	        })
	    })
	    .then(function(response){
	    	 // Handles validation errors returned by the server
	        if (!response.ok) {
	            return response.json().then(function(errors){

	            	// Displays field-specific validation messages
	                if(errors.name){
	                    document.getElementById("nameError").innerText = errors.name;
	                }
	                if(errors.email){
	                    document.getElementById("emailError").innerText = errors.email;
	                }
	                if(errors.phone){
	                    document.getElementById("phoneError").innerText = errors.phone;
	                }
	                if(errors.department){
	                    document.getElementById("departmentError").innerText = errors.department;
	                }
	                if(errors.salary){
	                    document.getElementById("salaryError").innerText = errors.salary;
	                }

	                throw new Error();
	            });
	        }	
	        
	     // Show success message and redirect to home page
	        showSuccess("Employee added successfully!");
	        setTimeout(function() {
	            window.location.href = "/index.html";
	        }, 800);

	    })
	    .catch(function(error){
	    	console.error("Error:", error);
	    	// Displays generic error message
	        showError("Validation Failed");
	    });
	}
	
	// Displays success notification
    function showSuccess(message) {
        var toast = document.getElementById("successToast");
        toast.innerText = message;
        toast.style.display = "block";
    
        setTimeout(function() {
            toast.style.display = "none";
        }, 1000);
    }
	
 	// Displays error notification
    function showError(message) {
        var toast = document.getElementById("errorToast");
        toast.innerText = message;
        toast.style.display = "block";
    
        setTimeout(function() {
            toast.style.display = "none";
        }, 1000);
    }
    
   </script>

</body>
</html>
