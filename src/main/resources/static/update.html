<!DOCTYPE html>
<html>
<head>
<title>Update Employee</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet">
<style>
.toast-msg {
	position: fixed;
	bottom: 10px;
	right: 20px;
	padding: 5px;
	min-width: 250px;
	max-width: 300px;
	z-index: 1000;
}
</style>
</head>

<body class="bg-light">
    <!-- Update Form -->
    <div class="container mt-5">
        <div class="row justify-content-center">

            <div class="col-md-7">

                <div class="card shadow">

                    <div
                        class="card-header text-center bg-primary text-white">
                        <h4>Update Employee</h4>
                    </div>


                    <form onsubmit="updateEmployee(event)">
                        <div class="card-body">
                            <input type="hidden" id="eid">

                            <div class="mb-3">
                                <label>Name</label> <input type="text"
                                    id="name" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Email</label> <input type="text"
                                    id="email" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Phone</label> <input type="text"
                                    id="phone" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Department</label> <input
                                    type="text" id="department"
                                    class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Salary</label> <input
                                    type="number" id="salary"
                                    class="form-control">
                            </div>

                            <button class="btn btn-primary w-100"
                                onclick="updateEmployee()">
                                Update Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Toast Messages -->
    <div id="successToast"
        class="alert alert-success text-center toast-msg"
        style="display: none;">Success Message</div>

    <div id="errorToast"
        class="alert alert-danger text-center toast-msg"
        style="display: none;">Error Message</div>

    <script>

	window.onload = loadEmployeeData;
	
//Load employee data from localStorage and populate the form
 function loadEmployeeData() {
	
    var emp = JSON.parse(localStorage.getItem("employee"));

    if (emp) {
        document.getElementById("eid").value = emp.eid;
        document.getElementById("name").value = emp.name;
        document.getElementById("email").value = emp.email;
        document.getElementById("phone").value = emp.phone;
        document.getElementById("department").value = emp.department;
        document.getElementById("salary").value = emp.salary;
    }
};

function updateEmployee(event) {
	event.preventDefault();
	
    var eid = document.getElementById("eid").value;

    var employee = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value,
        salary: document.getElementById("salary").value
    };

    fetch("/employees/" + eid, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(employee)
    })
    .then(function(response) {
    	if(!response.ok){
    		throw new Error("Update failed");
    	}
        return response.json();
    }).then(function(data){
    	showSuccess("Employee updated successfully");

        localStorage.removeItem("employee");
        setTimeout(function() {
        	// Redirect to employee list page
   	        window.location.href = "/index.html";
   	    }, 800);

    })
    .catch(function(error) {
        console.error("Error:", error);
        showError("Update failed");
    });
    
}

function showSuccess(message) {
    var toast = document.getElementById("successToast");
    toast.innerText = message;
    toast.style.display = "block";

    setTimeout(function() {
        toast.style.display = "none";
    }, 1200);
}

function showError(message) {
    var toast = document.getElementById("errorToast");
    toast.innerText = message;
    toast.style.display = "block";

    setTimeout(function() {
        toast.style.display = "none";
    }, 1200);
}

</script>

</body>
</html>
